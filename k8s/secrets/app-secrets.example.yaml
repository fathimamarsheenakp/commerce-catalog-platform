# Copy to app-secrets.yaml and replace values, then: kubectl apply -f k8s/secrets/app-secrets.yaml
# Or: kubectl apply -k k8s  (after placing app-secrets.yaml next to this file and adding it to kustomization)
#
# NEVER commit app-secrets.yaml with real production secrets.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: commerce-catalog
type: Opaque
stringData:
  JWT_SECRET: replace-with-long-random-secret-at-least-32-characters
  ADMIN_USERNAME: admin
  # BCrypt hash for password "password" (dev only)
  ADMIN_PASSWORD_HASH: $2a$10$92IXUNpkjO0rOQ5byMi.Ye4oKoEa3Ro9llC/.og/at2.uheWG/igi
  USER_USERNAME: user
  USER_PASSWORD_HASH: $2a$10$92IXUNpkjO0rOQ5byMi.Ye4oKoEa3Ro9llC/.og/at2.uheWG/igi
