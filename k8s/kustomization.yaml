apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: commerce-catalog

resources:
  - namespace.yaml
  - config/app-configmap.yaml
  - secrets/app-secrets.yaml
  - infrastructure/zookeeper.yaml
  - infrastructure/kafka.yaml
  - infrastructure/elasticsearch.yaml
  - infrastructure/cassandra.yaml
  - apps/product-service.yaml
  - apps/search-service.yaml
  - apps/api-gateway.yaml
  - apps/frontend.yaml

commonLabels:
  app.kubernetes.io/part-of: commerce-catalog
