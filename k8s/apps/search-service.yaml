apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  labels:
    app: search-service
    app.kubernetes.io/part-of: commerce-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      initContainers:
        - name: wait-elasticsearch
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z elasticsearch 9200; do echo waiting for elasticsearch; sleep 5; done
        - name: wait-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z kafka 9092; do echo waiting for kafka; sleep 3; done
      containers:
        - name: search-service
          image: commerce-catalog/search-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_PROFILES_ACTIVE
            - name: SERVER_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SERVER_ADDRESS
            - name: SPRING_ELASTICSEARCH_URIS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_ELASTICSEARCH_URIS
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_KAFKA_BOOTSTRAP_SERVERS
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 768Mi
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  labels:
    app: search-service
spec:
  selector:
    app: search-service
  ports:
    - port: 8082
      targetPort: 8082
