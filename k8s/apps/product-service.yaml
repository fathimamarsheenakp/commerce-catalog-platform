apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  labels:
    app: product-service
    app.kubernetes.io/part-of: commerce-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      initContainers:
        - name: wait-cassandra
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z cassandra 9042; do echo waiting for cassandra; sleep 5; done
        - name: wait-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z kafka 9092; do echo waiting for kafka; sleep 3; done
      containers:
        - name: product-service
          image: commerce-catalog/product-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: SPRING_CASSANDRA_CONTACT_POINTS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_CASSANDRA_CONTACT_POINTS
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_KAFKA_BOOTSTRAP_SERVERS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ADMIN_USERNAME
            - name: ADMIN_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ADMIN_PASSWORD_HASH
            - name: USER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: USER_USERNAME
            - name: USER_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: USER_PASSWORD_HASH
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 20
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 768Mi
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  labels:
    app: product-service
spec:
  selector:
    app: product-service
  ports:
    - port: 8081
      targetPort: 8081
