spring.application.name=search-service

server.port=8082
# Default: listen on all interfaces (works with Docker Compose + local gateway on :8080).
# For localhost-only binding: run with -Dspring-boot.run.profiles=local

spring.elasticsearch.uris=http://localhost:9200

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=search-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=searchservice.event.ProductEvent

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true